<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1,viewport-fit=cover"><title>Beyblade Utility</title><meta name="theme-color" content="#0d0d0d"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="mobile-web-app-capable" content="yes"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22><rect width=%22512%22 height=%22512%22 rx=%2290%22 fill=%22%230d0d0d%22/><circle cx=%22256%22 cy=%22256%22 r=%22200%22 fill=%22none%22 stroke=%22%23ffd700%22 stroke-width=%2220%22/><circle cx=%22256%22 cy=%22256%22 r=%2280%22 fill=%22%231a6fff%22/><circle cx=%22256%22 cy=%22256%22 r=%2230%22 fill=%22%23ffd700%22/></svg>"><link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22><rect width=%22512%22 height=%22512%22 rx=%2290%22 fill=%22%230d0d0d%22/><circle cx=%22256%22 cy=%22256%22 r=%22200%22 fill=%22none%22 stroke=%22%23ffd700%22 stroke-width=%2220%22/><circle cx=%22256%22 cy=%22256%22 r=%2280%22 fill=%22%231a6fff%22/><circle cx=%22256%22 cy=%22256%22 r=%2230%22 fill=%22%23ffd700%22/></svg>"><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;background:#0d0d0d;color:#eee;font-family:Segoe UI,system-ui,sans-serif}body{padding:max(12px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));overflow:auto}.wrap{max-width:760px;margin:0 auto}.card{background:#161616;border:1px solid #333;border-radius:20px;padding:16px;margin:12px 0}.title{font-size:clamp(22px,6vw,34px);font-weight:800;color:#ffd700;margin-bottom:8px}.sub{font-size:clamp(12px,3vw,15px);color:#aaa;margin-bottom:10px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{border:none;border-radius:14px;padding:12px 16px;min-height:46px;font-size:clamp(14px,3.5vw,18px);font-weight:700;cursor:pointer}.btn-primary{background:#ffd700;color:#000}.btn-dark{background:#333;color:#ddd}.btn-red{background:#b12d2d;color:#fff}.rpm{font-size:clamp(56px,18vw,120px);font-weight:900;line-height:1}.hz{font-size:clamp(18px,4vw,28px);color:#aaa}.good{color:#5fe76d}.warn{color:#ffcf43}.bad{color:#ff6666}label{font-size:clamp(13px,3vw,16px);color:#bbb}select{background:#222;color:#eee;border:1px solid #444;border-radius:10px;padding:10px;min-height:44px;font-size:clamp(14px,3vw,17px)}canvas{width:100%;height:160px;background:#090909;border:1px solid #333;border-radius:14px;display:block;margin-top:10px}.sp{display:flex;justify-content:space-between;align-items:center;gap:10px}@media(max-width:520px){.sp{flex-direction:column;align-items:flex-start}}</style>
</head>
<body>
<div class="wrap">
  <div class="card sp"><div><div class="title" id="ttl">Utility</div><div class="sub" id="tip"></div></div><div class="row"><button class="btn btn-dark" id="backBtn">← Back</button><button class="btn btn-primary" id="toggleBtn">中文</button></div></div>
  <div class="card"><div class="title" id="rpmLbl">RPM Meter</div><div class="row" style="margin:8px 0"><label id="langLbl">Language</label><span style="color:#888"></span></div><div class="row"><label id="wingLbl">Blade wing count</label><select id="wingCount"><option value="1">1</option><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select><button class="btn btn-red" id="startBtn">Start Listening</button></div><div class="sp" style="margin-top:14px"><div><div class="sub" id="peakLbl">Peak RPM</div><div style="font-size:clamp(22px,8vw,40px);font-weight:800" id="peakVal">0</div></div><div><div class="sub" id="hzLbl">Detected Hz</div><div class="hz"><span id="hzVal">0.0</span> Hz</div></div><div><div class="sub" id="stLbl">Signal</div><div class="hz" id="sig">No signal</div></div></div><div class="rpm" id="rpmVal">0</div><canvas id="wave"></canvas></div>
</div>
<script>
let LANG=localStorage.getItem('bbxLang')||'en';
const T={title:['Utility','工具'],back:['← Back','← 返回'],lang:['Language','語言'],rpm:['RPM Meter','RPM 計'],start:['Start Listening','開始收音'],stop:['Stop','停止'],wings:['Blade wing count','翼數'],peak:['Peak RPM','最高 RPM'],hz:['Detected Hz','偵測 Hz'],status:['Signal','訊號'],good:['Good','良好'],weak:['Weak','偏弱'],none:['No signal','無訊號'],tip:['Tip: keep the phone close to the stadium wall and set the wing count to the number of repeating sound pulses per rotation.','提示：把手機放近場地邊，翼數設為每一圈重複聲脈衝的數量。']};
function tt(k){return T[k][LANG==='zh'?1:0]}
function renderText(){document.getElementById('ttl').textContent=tt('title');document.getElementById('backBtn').textContent=tt('back');document.getElementById('langLbl').textContent=tt('lang');document.getElementById('rpmLbl').textContent=tt('rpm');document.getElementById('wingLbl').textContent=tt('wings');document.getElementById('peakLbl').textContent=tt('peak');document.getElementById('hzLbl').textContent=tt('hz');document.getElementById('stLbl').textContent=tt('status');document.getElementById('tip').textContent=tt('tip');document.getElementById('toggleBtn').textContent=(LANG==='zh'?'EN':'中文');document.getElementById('startBtn').textContent=(running?tt('stop'):tt('start'));}
document.addEventListener('DOMContentLoaded',renderText);
document.getElementById('toggleBtn').addEventListener('click',()=>{LANG=(LANG==='en')?'zh':'en';localStorage.setItem('bbxLang',LANG);renderText();});
let audioCtx=null,stream=null,source=null,analyser=null,data=null,raf=0,running=false,peakRpm=0;
const canvas=document.getElementById('wave');const g=canvas.getContext('2d');
function resizeCanvas(){canvas.width=Math.max(320,canvas.clientWidth*devicePixelRatio);canvas.height=Math.max(120,canvas.clientHeight*devicePixelRatio);}window.addEventListener('resize',resizeCanvas);resizeCanvas();
function drawWave(arr){g.clearRect(0,0,canvas.width,canvas.height);g.strokeStyle='#1a6fff';g.lineWidth=2*devicePixelRatio;g.beginPath();const step=canvas.width/arr.length;for(let i=0;i<arr.length;i++){const x=i*step;const y=(0.5-arr[i]/2)*canvas.height; if(i===0)g.moveTo(x,y); else g.lineTo(x,y);}g.stroke();}
function autoCorrelate(buf,sampleRate){let SIZE=buf.length; let rms=0; for(let i=0;i<SIZE;i++){const v=buf[i]; rms+=v*v;} rms=Math.sqrt(rms/SIZE); if(rms<0.01) return {freq:0,quality:0}; let r1=0,r2=SIZE-1,thres=0.2; for(let i=0;i<SIZE/2;i++){ if(Math.abs(buf[i])<thres){r1=i; break;} } for(let i=1;i<SIZE/2;i++){ if(Math.abs(buf[SIZE-i])<thres){r2=SIZE-i; break;} } buf=buf.slice(r1,r2); SIZE=buf.length; const c=new Array(SIZE).fill(0); for(let i=0;i<SIZE;i++){ for(let j=0;j<SIZE-i;j++) c[i]+=buf[j]*buf[j+i]; } let d=0; while(d+1<SIZE && c[d]>c[d+1]) d++; let maxval=-1, maxpos=-1; for(let i=d;i<SIZE;i++){ if(c[i]>maxval){maxval=c[i]; maxpos=i;} } if(maxpos<=0) return {freq:0,quality:rms}; let T0=maxpos; const x1=c[T0-1]||c[T0], x2=c[T0]||c[T0-1], x3=c[T0+1]||c[T0]; const a=(x1+x3-2*x2)/2, b=(x3-x1)/2; if(a) T0=T0-b/(2*a); const freq=sampleRate/T0; return {freq:(freq>20&&freq<5000)?freq:0,quality:rms}; }
function setSignal(freq,q,rpm){const s=document.getElementById('sig'); s.className=''; if(!freq||rpm<1){s.textContent=tt('none'); s.classList.add('bad');} else if(q<0.03){s.textContent=tt('weak'); s.classList.add('warn');} else {s.textContent=tt('good'); s.classList.add('good');}}
async function startMic(){if(running){stopMic();return;} try{stream=await navigator.mediaDevices.getUserMedia({audio:true}); audioCtx=new (window.AudioContext||window.webkitAudioContext)(); source=audioCtx.createMediaStreamSource(stream); analyser=audioCtx.createAnalyser(); analyser.fftSize=8192; analyser.smoothingTimeConstant=0.25; source.connect(analyser); data=new Float32Array(analyser.fftSize); running=true; renderText(); loop(); }catch(e){alert('Microphone permission failed');}}
function stopMic(){running=false; cancelAnimationFrame(raf); if(stream) stream.getTracks().forEach(t=>t.stop()); if(audioCtx) audioCtx.close(); stream=source=analyser=audioCtx=null; document.getElementById('rpmVal').textContent='0'; document.getElementById('hzVal').textContent='0.0'; setSignal(0,0,0); renderText();}
function loop(){if(!running||!analyser) return; analyser.getFloatTimeDomainData(data); drawWave(data); const out=autoCorrelate(Array.from(data),audioCtx.sampleRate); const wings=Math.max(1,parseInt(document.getElementById('wingCount').value)||3); const rpm=out.freq?out.freq*60/wings:0; if(rpm>peakRpm) peakRpm=rpm; document.getElementById('rpmVal').textContent=Math.round(rpm); document.getElementById('hzVal').textContent=(out.freq||0).toFixed(1); document.getElementById('peakVal').textContent=Math.round(peakRpm); setSignal(out.freq,out.quality,rpm); raf=requestAnimationFrame(loop);} 
document.getElementById('startBtn').addEventListener('click',startMic); document.getElementById('backBtn').addEventListener('click',()=>location.href='index.html');
</script>
</body>
</html>
