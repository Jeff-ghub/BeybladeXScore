<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1,viewport-fit=cover">
<title>Utilities - BeyScore</title>
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--dark:#0d0d0d;--card:#1a1a1a;--border:#333;--text:#eee;--muted:#888;--gold:#ffd700;--p1:#1a6fff;--p2:#ff3a3a}
html,body{min-height:100%;background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}
.page{max-width:500px;margin:0 auto;padding:20px 16px;padding-top:max(20px,env(safe-area-inset-top));padding-bottom:max(20px,env(safe-area-inset-bottom))}
.back{display:inline-flex;align-items:center;gap:6px;background:#333;color:#ccc;border:none;border-radius:10px;padding:10px 18px;font-size:clamp(14px,3.5vw,18px);cursor:pointer;touch-action:manipulation;min-height:44px}
.back:active{background:#555}
h1{color:var(--gold);font-size:clamp(24px,6vw,32px);margin:16px 0 8px;text-align:center}
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin:12px 0}
.section h2{color:var(--gold);font-size:clamp(16px,4vw,20px);margin-bottom:10px}
.section p{color:var(--muted);font-size:clamp(12px,3vw,15px);margin-bottom:10px}
.lang-row{display:flex;gap:8px;align-items:center;justify-content:center}
.lang-btn{flex:1;border:2px solid var(--border);border-radius:10px;padding:14px;text-align:center;font-size:clamp(16px,4vw,20px);font-weight:700;cursor:pointer;touch-action:manipulation;min-height:52px;background:#222;color:#888;transition:all .2s}
.lang-btn.active{border-color:var(--gold);color:var(--gold);background:#1a1a0a}
.lang-btn:active{opacity:.7}
.tool-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid var(--border);border-radius:12px;padding:16px 20px;cursor:pointer;touch-action:manipulation;min-height:60px;color:var(--text);font-size:clamp(15px,3.5vw,19px);font-weight:600;text-decoration:none;margin:8px 0;transition:all .2s}
.tool-btn:active{opacity:.7;transform:scale(.98)}
.tool-btn .arrow{color:var(--gold);font-size:24px}
.tool-btn .desc{font-size:clamp(11px,2.5vw,13px);color:var(--muted);font-weight:400;margin-top:2px}
.version{text-align:center;color:#444;font-size:11px;margin-top:20px}
</style>
</head>
<body>
<div class="page">
  <button class="back" onclick="window.location.href='index.html'">&#8592; Back</button>
  <h1>&#9881; Utilities</h1>

  <div class="section">
    <h2>&#127760; Language</h2>
    <p id="langDesc">Choose display language</p>
    <div class="lang-row">
      <div class="lang-btn" id="btnEn" onclick="setLang('en')">EN<br><span style="font-size:12px;font-weight:400">English</span></div>
      <div class="lang-btn" id="btnZh" onclick="setLang('zh')">&#20013;&#25991;<br><span style="font-size:12px;font-weight:400">Traditional</span></div>
    </div>
  </div>

  <div class="section">
    <h2>&#128295; Tools</h2>
    <a class="tool-btn" href="rpm.html">
      <div>
        &#127919; <span id="rpmLabel">RPM Analyzer</span>
        <div class="desc" id="rpmDesc">Measure spinning speed using microphone</div>
      </div>
      <span class="arrow">&#8250;</span>
    </a>
  </div>

  <div class="version">BeyScore v1.0</div>
</div>

<script>
var LANG=localStorage.getItem('bbxLang')||'en';
function setLang(l){
  LANG=l;
  localStorage.setItem('bbxLang',l);
  updateLangUI();
}
function updateLangUI(){
  document.getElementById('btnEn').classList.toggle('active',LANG==='en');
  document.getElementById('btnZh').classList.toggle('active',LANG==='zh');
  if(LANG==='zh'){
    document.getElementById('langDesc').textContent='\u9078\u64C7\u986F\u793A\u8A9E\u8A00';
    document.getElementById('rpmLabel').textContent='RPM \u8F49\u901F\u5206\u6790';
    document.getElementById('rpmDesc').textContent='\u4F7F\u7528\u9EA5\u514B\u98A8\u6E2C\u91CF\u65CB\u8F49\u901F\u5EA6';
  }else{
    document.getElementById('langDesc').textContent='Choose display language';
    document.getElementById('rpmLabel').textContent='RPM Analyzer';
    document.getElementById('rpmDesc').textContent='Measure spinning speed using microphone';
  }
}
updateLangUI();
</script>
</body>
</html>
