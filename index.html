<style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{--p1:#1a6fff;--p1bg:#0a1a3a;--p2:#ff3a3a;--p2bg:#3a0a0a;--dark:#0d0d0d;--card:#1a1a1a;--border:#333;--text:#eee;--muted:#888;--gold:#ffd700}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;font-family:Segoe UI,system-ui,sans-serif;background:var(--dark);color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;width:100%}
.p2-btns,.p1-btns{display:flex;flex-shrink:0}
.p2-btns{transform:rotate(180deg);padding-top:env(safe-area-inset-bottom)}
.p1-btns{padding-bottom:env(safe-area-inset-bottom)}
.p2-btns .sb,.p1-btns .sb{flex:1;border:none;min-height:64px;font-size:clamp(24px,7vw,38px);font-weight:800;color:#fff;cursor:pointer;touch-action:manipulation;text-shadow:0 2px 4px rgba(0,0,0,.5)}
.p2-btns .sb:nth-child(1){background:#ff3a3a}.p2-btns .sb:nth-child(2){background:#cc2a2a}.p2-btns .sb:nth-child(3){background:#991d1d}
.p1-btns .sb:nth-child(1){background:#1a6fff}.p1-btns .sb:nth-child(2){background:#1258cc}.p1-btns .sb:nth-child(3){background:#0d3f99}
.p2-area,.p1-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:8px}
.p2-area{transform:rotate(180deg);background:linear-gradient(180deg,var(--p2bg),#0d0d0d)}
.p1-area{background:linear-gradient(180deg,#0d0d0d,var(--p1bg))}
.mid-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 8px;min-height:48px;background:linear-gradient(180deg,#1a1a1a,#111);border-top:2px solid var(--gold);border-bottom:2px solid var(--gold);overflow:hidden;flex-wrap:nowrap}
.mid-bar .mb{border:none;border-radius:10px;background:#333;color:#ccc;font-size:clamp(12px,2.8vw,16px);padding:6px 12px;min-height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;white-space:nowrap}
.sn{font-size:clamp(100px,38vw,250px);font-weight:900;line-height:1;text-shadow:0 0 30px currentColor;transition:all .25s}
.p1c{color:var(--p1)} .p2c{color:var(--p2)}
.winner{color:var(--gold)!important;text-shadow:0 0 50px rgba(255,215,0,.6);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.pd{display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:96%;margin-top:4px;text-align:center}
.pd span{font-size:clamp(11px,2.5vw,15px)}
.plbl{font-size:clamp(14px,3.5vw,20px);font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.75}
.wt{color:var(--gold);font-size:clamp(10px,2vw,14px)}
.type-badge{font-size:clamp(9px,1.8vw,12px);padding:1px 5px;border-radius:3px;font-weight:600;text-transform:uppercase}
.t-attack{background:#c62828;color:#fff}.t-defense{background:#1565c0;color:#fff}.t-stamina{background:#2e7d32;color:#fff}.t-balance{background:#6a1b9a;color:#fff}
.sys-badge{font-size:clamp(8px,1.5vw,11px);padding:1px 4px;border-radius:3px;font-weight:700;margin-right:2px}.sys-bx{background:#444;color:#ccc}.sys-ux{background:#1a5276;color:#aed6f1}.sys-cx{background:#7d3c98;color:#e8daef}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:100;display:flex;flex-direction:column;align-items:center;padding:16px;padding-top:max(16px,env(safe-area-inset-top));overflow:auto}
.overlay h2{color:var(--gold);margin:8px 0;font-size:clamp(18px,5vw,26px)}
.overlay h3{color:var(--muted);margin:6px 0 2px;font-size:clamp(14px,3.5vw,18px)}
.close-btn{position:sticky;top:0;align-self:flex-end;background:var(--p2);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sel-wrap{margin:4px 0}.sel-wrap label{color:var(--muted);font-size:clamp(12px,2.5vw,15px)}
.sel-wrap select{width:100%;padding:10px;font-size:clamp(14px,3vw,17px);background:#222;color:#eee;border:1px solid #444;border-radius:8px;margin-top:2px;min-height:44px}
.parts-col{display:flex;gap:12px;width:100%;max-width:700px}.parts-side{flex:1;min-width:0}.parts-side.p1s{border-right:1px solid var(--border);padding-right:10px}.parts-side.p2s{padding-left:10px}
@media(max-width:520px){.parts-col{flex-direction:column}.parts-side.p1s{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:10px}.parts-side.p2s{padding-left:0;padding-top:10px}}
.btn-gold,.btn-clear{min-height:44px;border:none;border-radius:10px;padding:12px 18px;cursor:pointer;font-size:clamp(13px,3vw,16px)}
.btn-gold{background:linear-gradient(135deg,#b8860b,#ffd700);color:#000;font-weight:700}.btn-clear{background:#333;color:#ddd;border:1px solid #555}
.hcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin:6px 0;width:100%;max-width:560px;font-size:clamp(12px,3vw,15px);cursor:pointer}.hh{display:flex;justify-content:space-between;color:var(--muted);font-size:.85em;margin-bottom:4px}.hb{display:flex;justify-content:space-between;align-items:center}.hs{text-align:center;flex:1}.hvs{font-weight:900;color:var(--gold);font-size:1.2em;padding:0 6px}.hc-rounds{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}.hc-rounds.open{display:block}.rnd-row{font-size:clamp(10px,2.2vw,13px);padding:4px 0;border-bottom:1px solid #222;color:var(--muted)}.rnd-num{color:var(--gold);font-weight:700}.rnd-p1{color:var(--p1)}.rnd-p2{color:var(--p2)}.hc-expand{font-size:clamp(10px,2.2vw,13px);color:var(--gold);text-align:center;margin-top:4px}
.toast{position:fixed;top:0;left:0;right:0;z-index:300;text-align:center;padding:8px 14px;font-size:clamp(13px,3vw,16px);font-weight:600;transform:translateY(-100%);opacity:0;transition:transform .25s,opacity .25s;background:#222;color:var(--gold);border-bottom:1px solid var(--gold)}.toast.show{transform:translateY(0);opacity:1}
.hidden{display:none!important}
@media(max-height:600px){.sn{font-size:clamp(70px,28vw,160px)}.p2-btns .sb,.p1-btns .sb{min-height:52px;font-size:clamp(20px,6vw,30px)}}</style>

function tx(k){return TX[k]?TX[k][LANG==='zh'?1:0]:k;}

const bladeWtMap={},bladeTypeMap={},bladeZhMap={},bladeSysMap={},bitMap={},assistMap={};
let bladeList=[],ratchetList=[],bitList=[];
function applyData(src){
DATA=src;
bladeList=[];ratchetList=src.ratchets.slice();bitList=[];
src.blades.forEach(b=>{bladeWtMap[b[0]]=b[3];bladeTypeMap[b[0]]=b[2];bladeZhMap[b[0]]=b[1];bladeSysMap[b[0]]=b[4]; if(!bladeList.includes(b[0])) bladeList.push(b[0]);});
src.bits.forEach(b=>{bitMap[b[0]]=b; bitList.push(b[0]);});
src.assists.forEach(a=>assistMap[a[0]]=a);
bladeList.sort(); bitList.sort(); ratchetList.sort((a,b)=>{const pa=a.split('-'),pb=b.split('-');const a0=pa[0]==='M'?99:parseInt(pa[0]); const b0=pb[0]==='M'?99:parseInt(pb[0]); return a0!==b0?a0-b0:(parseInt(pa[1])-parseInt(pb[1]));});
}
applyData(FALLBACK);
function getRW(n){const p=n.split('-');const h=parseInt(p[1])||60;if(h<=50)return 5;if(h<=55)return 5.5;if(h<=60)return 6.5;if(h<=65)return 6.8;if(h<=70)return 7;if(h<=80)return 7.5;return 8;}
function getBitW(){return 2;}
function getBladeWt(n){return bladeWtMap[n]||33;}
function getTotalWt(pp){let t=0;if(pp.blade)t+=getBladeWt(pp.blade);if(pp.ratchet)t+=getRW(pp.ratchet);if(pp.bit)t+=getBitW();return t;}
function isCX(n){return bladeSysMap[n]==='CX';}
function copyPP(pp){return {blade:pp.blade,assist:pp.assist,ratchet:pp.ratchet,bit:pp.bit};}
function getBladeLbl(name){const zh=bladeZhMap[name]||''; const tp=bladeTypeMap[name]||'balance'; const w=getBladeWt(name); const sys=bladeSysMap[name]||'BX'; if(LANG==='zh'&&zh) return '['+sys+'] '+zh+' ('+name+') ~'+w.toFixed(1)+'g'; return '['+sys+'] '+name+(zh?' ('+zh+')':'')+' ['+tp.charAt(0).toUpperCase()+tp.slice(1)+'] ~'+w.toFixed(1)+'g';}
function getBitLbl(a){if(LANG==='zh') return a; const bo=bitMap[a]; return bo?(a+' - '+bo[2]):a;}
function getAssistLbl(a){const ao=assistMap[a]; if(!ao) return a; return LANG==='zh'?(a+' '+ao[2]):(a+' - '+ao[1]);}
function modelStr(pp){const parts=[]; if(pp.blade) parts.push(LANG==='zh'?(bladeZhMap[pp.blade]||pp.blade):pp.blade); if(pp.assist) parts.push(pp.assist); if(pp.ratchet) parts.push(pp.ratchet); if(pp.bit) parts.push(pp.bit); return parts.join(' ');}
function bitDisp(a){if(LANG==='zh') return a; const bo=bitMap[a]; return bo?bo[2]:a;}
function showToast(msg,dur=1800){const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),dur);}
let s1=0,s2=0,rounds=[],gameOver=false;
let pp1={blade:'',assist:'',ratchet:'',bit:''}, pp2={blade:'',assist:'',ratchet:'',bit:''};
let matchHist=JSON.parse(localStorage.getItem('bbxHist')||'[]');
function fillSel(id,items,defTxt,lblFn){const el=document.getElementById(id); el.innerHTML='<option value="">'+defTxt+'</option>'; items.forEach(v=>{const o=document.createElement('option'); o.value=v; o.textContent=lblFn(v); el.appendChild(o);});}
function populateDD(){fillSel('s1Blade',bladeList,tx('selBlade'),getBladeLbl); fillSel('s2Blade',bladeList,tx('selBlade'),getBladeLbl); fillSel('s1Ratchet',ratchetList,tx('selRatchet'),n=>n+' (~'+getRW(n).toFixed(1)+'g)'); fillSel('s2Ratchet',ratchetList,tx('selRatchet'),n=>n+' (~'+getRW(n).toFixed(1)+'g)'); fillSel('s1Bit',bitList,tx('selBit'),getBitLbl); fillSel('s2Bit',bitList,tx('selBit'),getBitLbl); fillSel('s1Assist',Object.keys(assistMap),tx('selAssist'),getAssistLbl); fillSel('s2Assist',Object.keys(assistMap),tx('selAssist'),getAssistLbl);}
function updateUI(){document.getElementById('p1Name').textContent=tx('player1'); document.getElementById('p2Name').textContent=tx('player2'); document.getElementById('undoBtn').innerHTML='↩'+tx('undo'); document.getElementById('partsBtn').innerHTML='⚙'+tx('parts'); document.getElementById('newBtn').innerHTML='🔄'+tx('newG'); document.getElementById('utilityBtn').innerHTML='🛠'; document.getElementById('histTitle').innerHTML='📋 '+tx('matchHistory'); document.getElementById('clearHistBtn').innerHTML='🗑 '+tx('clearAll'); document.getElementById('confirmBtn').textContent=tx('confirm'); document.getElementById('clearBtn').textContent=tx('clear'); document.getElementById('partsTitle').textContent=tx('selectParts'); document.getElementById('p1Hdr').textContent=tx('player1'); document.getElementById('p2Hdr').textContent=tx('player2'); for(const id of ['lb1B','lb2B'])document.getElementById(id).textContent=tx('blade'); for(const id of ['lb1R','lb2R'])document.getElementById(id).textContent=tx('ratchet'); for(const id of ['lb1Bit','lb2Bit'])document.getElementById(id).textContent=tx('bit'); for(const id of ['lb1A','lb2A'])document.getElementById(id).textContent=tx('assist'); populateDD(); renderDisp(1); renderDisp(2);}
function renderDisp(p){const pp=p===1?pp1:pp2; const el=document.getElementById('p'+p+'Disp'); if(!pp.blade&&!pp.ratchet&&!pp.bit){el.innerHTML=''; return;} let html=''; if(pp.blade){const sys=bladeSysMap[pp.blade]||'BX'; const tp=bladeTypeMap[pp.blade]||'balance'; const dn=LANG==='zh'?(bladeZhMap[pp.blade]||pp.blade):pp.blade; html+='<span class="sys-badge sys-'+sys.toLowerCase()+'">'+sys+'</span><span class="type-badge t-'+tp+'">'+tp+'</span><span style="font-weight:600">'+dn+'</span>';} if(pp.assist) html+='<span style="color:#e8daef;font-weight:600">'+pp.assist+'</span>'; if(pp.ratchet) html+='<span style="color:#aaa">'+pp.ratchet+'</span>'; if(pp.bit) html+='<span style="color:#aaa">'+bitDisp(pp.bit)+'</span>'; const tw=getTotalWt(pp); if(tw>0) html+='<span class="wt">⚖~'+tw.toFixed(1)+'g</span>'; el.innerHTML=html;}
function onBladeChange(side){const blade=document.getElementById('s'+side+'Blade').value; const wrap=document.getElementById('a'+side+'Wrap'); wrap.classList.toggle('hidden',!(blade&&isCX(blade))); if(!(blade&&isCX(blade))) document.getElementById('s'+side+'Assist').value=''; updWt(side);}
function updWt(side){const bl=document.getElementById('s'+side+'Blade').value, ra=document.getElementById('s'+side+'Ratchet').value, bi=document.getElementById('s'+side+'Bit').value; let t=0; if(bl)t+=getBladeWt(bl); if(ra)t+=getRW(ra); if(bi)t+=getBitW(); document.getElementById('wt'+side).textContent=t>0?('⚖ '+tx('estTotal')+' ~'+t.toFixed(1)+'g'):'';}
function openParts(){document.getElementById('partsOvl').classList.remove('hidden'); document.getElementById('s1Blade').value=pp1.blade; document.getElementById('s1Assist').value=pp1.assist; document.getElementById('s1Ratchet').value=pp1.ratchet; document.getElementById('s1Bit').value=pp1.bit; document.getElementById('s2Blade').value=pp2.blade; document.getElementById('s2Assist').value=pp2.assist; document.getElementById('s2Ratchet').value=pp2.ratchet; document.getElementById('s2Bit').value=pp2.bit; onBladeChange(1); onBladeChange(2);}
function closeParts(){document.getElementById('partsOvl').classList.add('hidden');}
function confirmParts(){pp1.blade=s1Blade.value; pp1.assist=(pp1.blade&&isCX(pp1.blade))?s1Assist.value:''; pp1.ratchet=s1Ratchet.value; pp1.bit=s1Bit.value; pp2.blade=s2Blade.value; pp2.assist=(pp2.blade&&isCX(pp2.blade))?s2Assist.value:''; pp2.ratchet=s2Ratchet.value; pp2.bit=s2Bit.value; renderDisp(1); renderDisp(2); closeParts();}
function clearAllParts(){['s1Blade','s1Assist','s1Ratchet','s1Bit','s2Blade','s2Assist','s2Ratchet','s2Bit'].forEach(id=>document.getElementById(id).value=''); onBladeChange(1); onBladeChange(2);}
function refreshScoreView(){p1Score.textContent=s1; p2Score.textContent=s2;}
function addPt(player,pts){const rnd={p1Bey:copyPP(pp1),p2Bey:copyPP(pp2),scorer:player,pts:pts}; if(player===1)s1+=pts; else s2+=pts; rnd.cumS1=s1; rnd.cumS2=s2; rounds.push(rnd); refreshScoreView(); checkWin();}
function undoScore(){ if(rounds.length===0) return; rounds.pop(); s1=0; s2=0; rounds.forEach(r=>{ if(r.scorer===1) s1+=r.pts; else s2+=r.pts; r.cumS1=s1; r.cumS2=s2; }); gameOver=false; p1Score.classList.remove('winner'); p2Score.classList.remove('winner'); refreshScoreView(); }
function checkWin(){ if(s1>=4){gameOver=true; p1Score.classList.add('winner'); saveMatch(1); try{navigator.vibrate([100,50,200]);}catch(e){} } else if(s2>=4){gameOver=true; p2Score.classList.add('winner'); saveMatch(2); try{navigator.vibrate([100,50,200]);}catch(e){} } }
function newGame(){s1=0;s2=0;rounds=[];gameOver=false;p1Score.classList.remove('winner');p2Score.classList.remove('winner');refreshScoreView();}
function saveMatch(winner){const rec={ts:new Date().toISOString(),s1,s2,w:winner,rounds:rounds.map(r=>({p1Bey:copyPP(r.p1Bey),p2Bey:copyPP(r.p2Bey),scorer:r.scorer,pts:r.pts,cumS1:r.cumS1,cumS2:r.cumS2}))}; matchHist.unshift(rec); if(matchHist.length>200) matchHist=matchHist.slice(0,200); localStorage.setItem('bbxHist',JSON.stringify(matchHist));}
function toggleRounds(idx){const el=document.getElementById('hcr-'+idx), btn=document.getElementById('hce-'+idx); const open=el.classList.toggle('open'); btn.innerHTML=open?tx('tapCollapse'):tx('tapExpand');}
function openHist(){histOvl.classList.remove('hidden'); if(matchHist.length===0){histList.innerHTML='<p style="text-align:center;color:#888;margin:20px">'+tx('noMatches')+'</p>'; return;} let html=''; matchHist.forEach((m,i)=>{ const d=new Date(m.ts); const ds=d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); html+='<div class="hcard" onclick="toggleRounds('+i+')"><div class="hh"><span>#'+(matchHist.length-i)+'</span><span>'+ds+'</span></div><div class="hb"><div class="hs"><span style="color:var(--p1);font-size:1.4em;font-weight:900">'+m.s1+'</span></div><div class="hvs">VS</div><div class="hs"><span style="color:var(--p2);font-size:1.4em;font-weight:900">'+m.s2+'</span></div></div><div style="text-align:center;margin-top:2px;font-size:.85em">'+(m.w===1?tx('p1Wins'):tx('p2Wins'))+'</div><div class="hc-expand" id="hce-'+i+'">'+tx('tapExpand')+'</div><div class="hc-rounds" id="hcr-'+i+'">'; (m.rounds||[]).forEach((r,j)=>{ const sc=r.scorer===1?'P1':'P2', scClass=r.scorer===1?'rnd-p1':'rnd-p2'; html+='<div class="rnd-row"><span class="rnd-num">R'+(j+1)+'</span> '+modelStr(r.p1Bey)+' vs '+modelStr(r.p2Bey)+' → <span class="'+scClass+'">'+sc+' +'+r.pts+'</span> <span style="color:#888">('+r.cumS1+'-'+r.cumS2+')</span></div>'; }); html+='</div></div>'; }); histList.innerHTML=html;}
function closeHist(){histOvl.classList.add('hidden');}
function clearHist(){if(confirm(tx('clearConfirm'))){matchHist=[]; localStorage.removeItem('bbxHist'); histList.innerHTML='<p style="text-align:center;color:#888;margin:20px">'+tx('noMatches')+'</p>';}}
function fetchT(url,ms){const c=new AbortController(); const t=setTimeout(()=>c.abort(),ms); return fetch(url,{signal:c.signal}).then(r=>{clearTimeout(t); if(!r.ok) throw new Error(); return r.json();}).catch(()=>{clearTimeout(t); return null;});}
function mergePartsJSON(data){ if(!data) return false; let updated=false; if(Array.isArray(data.blades)){ const seen=new Set(bladeList); data.blades.forEach(b=>{ if(!seen.has(b.en)){ DATA.blades.push([b.en,b.zh,b.type,b.weight,b.system]); seen.add(b.en); updated=true; } bladeWtMap[b.en]=b.weight; bladeTypeMap[b.en]=b.type; bladeZhMap[b.en]=b.zh; bladeSysMap[b.en]=b.system; }); bladeList=[...seen].sort(); } if(Array.isArray(data.ratchets)){ const set=new Set(ratchetList); data.ratchets.forEach(r=>{ if(!set.has(r)){ set.add(r); updated=true; } }); ratchetList=[...set].sort((a,b)=>{const pa=a.split('-'),pb=b.split('-'); const a0=pa[0]==='M'?99:parseInt(pa[0]); const b0=pb[0]==='M'?99:parseInt(pb[0]); return a0!==b0?a0-b0:(parseInt(pa[1])-parseInt(pb[1])); }); } if(Array.isArray(data.bits)){ const set=new Set(bitList); data.bits.forEach(b=>{ if(!set.has(b.abbr)){ set.add(b.abbr); bitMap[b.abbr]=[b.abbr,b.en,b.bold]; updated=true; } else bitMap[b.abbr]=[b.abbr,b.en,b.bold]; }); bitList=[...set].sort(); } if(Array.isArray(data.assists)){ data.assists.forEach(a=>assistMap[a.abbr]=[a.abbr,a.en,a.zh]); } return updated; }
function loadData(){ showToast(tx('syncing'),1200); Promise.allSettled([ fetchT('parts.json',2500), fetchT('https://go-shoot.github.io/x/db/part-blade.json',2500), fetchT('https://go-shoot.github.io/x/db/part-ratchet.json',2500), fetchT('https://go-shoot.github.io/x/db/part-bit.json',2500)]).then(res=>{const local=res[0].status==='fulfilled'?res[0].value:null; if(local){ mergePartsJSON(local); } const bd=res[1].status==='fulfilled'?res[1].value:null; const rd=res[2].status==='fulfilled'?res[2].value:null; const bt=res[3].status==='fulfilled'?res[3].value:null; if(Array.isArray(bd)){ bd.forEach(b=>{ const en=b.en_name||''; if(!en) return; bladeWtMap[en]=(b.defaultStatus&&b.defaultStatus.weight)||bladeWtMap[en]||33; bladeTypeMap[en]=b.type||bladeTypeMap[en]||'balance'; if(b.name) bladeZhMap[en]=b.name['zh-HK']||b.name['zh-TW']||bladeZhMap[en]||en; bladeSysMap[en]=bladeSysMap[en]||'BX'; if(!bladeList.includes(en)) bladeList.push(en); }); bladeList.sort(); } if(Array.isArray(rd)){ rd.forEach(r=>{ const n=r.en_name||''; if(n&&!ratchetList.includes(n)) ratchetList.push(n); }); ratchetList.sort((a,b)=>{const pa=a.split('-'),pb=b.split('-'); const a0=pa[0]==='M'?99:parseInt(pa[0]); const b0=pb[0]==='M'?99:parseInt(pb[0]); return a0!==b0?a0-b0:(parseInt(pa[1])-parseInt(pb[1])); }); } if(Array.isArray(bt)){ bt.forEach(b=>{ const n=b.en_name||''; if(n&&!bitList.includes(n)) bitList.push(n); }); bitList.sort(); } populateDD(); showToast(tx('synced')+' '+bladeList.length, 1800); }).catch(()=>showToast(tx('offline'),1800)); }
