<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{--p1:#1a6fff;--p1bg:#0a1a3a;--p2:#ff3a3a;--p2bg:#3a0a0a;--dark:#0d0d0d;--card:#1a1a1a;--border:#333;--text:#eee;--muted:#888;--gold:#ffd700}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;font-family:'Segoe UI',system-ui,sans-serif;background:var(--dark);color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;width:100%}
.p2-btns{display:flex;transform:rotate(180deg);flex-shrink:0;padding-top:env(safe-area-inset-bottom)}
.p2-btns .sb,.p1-btns .sb{flex:1;border:none;min-height:64px;font-size:clamp(24px,7vw,38px);font-weight:800;color:#fff;cursor:pointer;touch-action:manipulation;text-shadow:0 2px 4px rgba(0,0,0,.5)}
.p2-btns .sb:active,.p1-btns .sb:active{opacity:.7}
.p2-btns .sb:nth-child(1){background:#ff3a3a}.p2-btns .sb:nth-child(2){background:#cc2a2a}.p2-btns .sb:nth-child(3){background:#991d1d}
.p2-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:rotate(180deg);background:linear-gradient(180deg,var(--p2bg),#0d0d0d);overflow:hidden}
.mid-bar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 8px;background:linear-gradient(180deg,#1a1a1a,#111);border-top:2px solid var(--gold);border-bottom:2px solid var(--gold);flex-wrap:nowrap;min-height:48px;overflow:hidden}
.mid-bar .mb{border:none;border-radius:10px;background:#333;color:#ccc;font-size:clamp(12px,2.8vw,16px);padding:6px 14px;min-height:40px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;white-space:nowrap;flex-shrink:0}
.mid-bar .mb:active{background:#555}
.p1-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0d0d0d,var(--p1bg));overflow:hidden}
.p1-btns{display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.p1-btns .sb:nth-child(1){background:#1a6fff}.p1-btns .sb:nth-child(2){background:#1258cc}.p1-btns .sb:nth-child(3){background:#0d3f99}
.sn{font-size:clamp(100px,38vw,250px);font-weight:900;line-height:1;text-shadow:0 0 30px currentColor;transition:all .3s}
.sn.p1c{color:var(--p1)}.sn.p2c{color:var(--p2)}
.sn.winner{color:var(--gold)!important;text-shadow:0 0 50px rgba(255,215,0,.6);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.pd{display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:95%;margin-top:4px}
.pd span{font-size:clamp(11px,2.5vw,15px)}
.plbl{font-size:clamp(14px,3.5vw,20px);font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.7}
.wt{color:var(--gold);font-size:clamp(10px,2vw,14px)}
.type-badge{font-size:clamp(9px,1.8vw,12px);padding:1px 5px;border-radius:3px;font-weight:600;text-transform:uppercase;display:inline-block}
.t-attack{background:#c62828;color:#fff}.t-defense{background:#1565c0;color:#fff}
.t-stamina{background:#2e7d32;color:#fff}.t-balance{background:#6a1b9a;color:#fff}
.sys-badge{font-size:clamp(8px,1.5vw,11px);padding:1px 4px;border-radius:3px;font-weight:700;margin-right:2px}
.sys-bx{background:#444;color:#ccc}.sys-ux{background:#1a5276;color:#aed6f1}.sys-cx{background:#7d3c98;color:#e8daef}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.94);z-index:100;display:flex;flex-direction:column;align-items:center;padding:16px;padding-top:max(16px,env(safe-area-inset-top));overflow-y:auto}
.overlay h2{color:var(--gold);margin:8px 0;font-size:clamp(18px,5vw,26px)}
.overlay h3{color:var(--muted);margin:6px 0 2px;font-size:clamp(14px,3.5vw,18px)}
.close-btn{position:sticky;top:0;align-self:flex-end;background:var(--p2);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:24px;cursor:pointer;z-index:2;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sel-wrap{margin:4px 0}.sel-wrap label{color:var(--muted);font-size:clamp(12px,2.5vw,15px)}
.sel-wrap select{width:100%;padding:10px;font-size:clamp(14px,3vw,17px);background:#222;color:#eee;border:1px solid #444;border-radius:8px;margin-top:2px;min-height:44px}
.parts-col{display:flex;gap:12px;width:100%;max-width:600px}
.parts-side{flex:1;min-width:0}
.parts-side.p1s{border-right:1px solid var(--border);padding-right:10px}
.parts-side.p2s{padding-left:10px}
@media(max-width:480px){.parts-col{flex-direction:column;gap:6px}.parts-side.p1s{border-right:none;border-bottom:1px solid var(--border);padding:0 0 8px 0}.parts-side.p2s{padding:8px 0 0 0}}
.btn-gold{border:none;border-radius:12px;background:linear-gradient(135deg,#b8860b,#ffd700);color:#000;font-size:clamp(16px,4vw,20px);font-weight:700;padding:14px 40px;cursor:pointer;min-height:48px;touch-action:manipulation}
.btn-clear{border:1px solid var(--border);border-radius:8px;background:#333;color:#ccc;font-size:clamp(13px,3vw,16px);padding:10px 24px;cursor:pointer;min-height:44px}
.hcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin:6px 0;width:100%;max-width:500px;font-size:clamp(12px,3vw,15px);cursor:pointer}
.hcard .hh{display:flex;justify-content:space-between;color:var(--muted);font-size:.85em;margin-bottom:4px}
.hcard .hb{display:flex;justify-content:space-between;align-items:center}
.hcard .hs{text-align:center;flex:1}.hcard .hvs{font-weight:900;color:var(--gold);font-size:1.2em;padding:0 6px}
.hcard .wl{color:var(--gold);font-weight:700}
.hc-rounds{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.hc-rounds.open{display:block}
.rnd-row{font-size:clamp(10px,2.2vw,13px);padding:4px 0;border-bottom:1px solid #222;color:var(--muted)}
.rnd-row .rnd-num{color:var(--gold);font-weight:700}.rnd-row .rnd-p1{color:var(--p1)}.rnd-row .rnd-p2{color:var(--p2)}
.hc-expand{font-size:clamp(10px,2.2vw,13px);color:var(--gold);text-align:center;margin-top:4px}
.toast{position:fixed;top:0;left:0;right:0;z-index:300;text-align:center;padding:8px 14px;font-size:clamp(13px,3vw,16px);font-weight:600;transition:transform .3s,opacity .3s;transform:translateY(-100%);opacity:0;background:#222;color:var(--gold);border-bottom:1px solid var(--gold)}
.toast.show{transform:translateY(0);opacity:1}
.hidden{display:none!important}
@media(max-height:600px){.sn{font-size:clamp(70px,28vw,160px)}.p2-btns .sb,.p1-btns .sb{min-height:52px;font-size:clamp(20px,6vw,30px)}}
</style>
</head>

var bladeWtMap={},bladeTypeMap={},bladeZhMap={},bladeSysMap={};
var bladeList=[],ratchetList=[],bitList=[];
FB_BLADES.forEach(function(b){bladeWtMap[b[0]]=b[3];bladeTypeMap[b[0]]=b[2];bladeZhMap[b[0]]=b[1];bladeSysMap[b[0]]=b[4];});
function getRW(n){var p=n.split('-');var h=parseInt(p[1])||60;if(h<=50)return 5;if(h<=55)return 5.5;if(h<=60)return 6.5;if(h<=65)return 6.8;if(h<=70)return 7;if(h<=80)return 7.5;return 8;}
function getBitW(){return 2;}
function getBladeWt(n){return bladeWtMap[n]||33;}
function getTotalWt(pp){var t=0;if(pp.blade)t+=getBladeWt(pp.blade);if(pp.ratchet)t+=getRW(pp.ratchet);if(pp.bit)t+=getBitW();return t;}
function isCX(n){return bladeSysMap[n]==='CX';}
function getBitObj(a){for(var i=0;i<FB_BITS.length;i++){if(FB_BITS[i][0]===a)return FB_BITS[i];}return null;}
function getAssistObj(a){for(var i=0;i<FB_ASSISTS.length;i++){if(FB_ASSISTS[i][0]===a)return FB_ASSISTS[i];}return null;}
function copyPP(pp){return {blade:pp.blade,assist:pp.assist,ratchet:pp.ratchet,bit:pp.bit};}
var s1=0,s2=0,rounds=[],gameOver=false;
var pp1={blade:'',assist:'',ratchet:'',bit:''},pp2={blade:'',assist:'',ratchet:'',bit:''};
var matchHist=JSON.parse(localStorage.getItem('bbxHist')||'[]');
function initData(){bladeList=[];ratchetList=[];bitList=[];var seen={};FB_BLADES.forEach(function(b){if(!seen[b[0]]){bladeList.push(b[0]);seen[b[0]]=true;}});ratchetList=FB_RATCHETS.slice();FB_BITS.forEach(function(b){bitList.push(b[0]);});bladeList.sort();ratchetList.sort(function(a,b){var pa=a.split('-'),pb=b.split('-');var a0=pa[0]==='M'?99:parseInt(pa[0]),b0=pb[0]==='M'?99:parseInt(pb[0]);if(a0!==b0)return a0-b0;return parseInt(pa[1])-parseInt(pb[1]);});bitList.sort();}
function getBladeLbl(name){var zh=bladeZhMap[name]||'';var tp=bladeTypeMap[name]||'balance';var w=getBladeWt(name);var sys=bladeSysMap[name]||'BX';if(LANG==='zh'&&zh)return '['+sys+'] '+zh+' ('+name+') ~'+w.toFixed(1)+'g';return '['+sys+'] '+name+(zh?' ('+zh+')':'')+' ['+tp.charAt(0).toUpperCase()+tp.slice(1)+'] ~'+w.toFixed(1)+'g';}
function getBitLbl(a){var bo=getBitObj(a);if(!bo)return a;if(LANG==='zh')return a;return a+' - '+bo[2];}
function getAssistLbl(a){var ao=getAssistObj(a);if(!ao)return a;if(LANG==='zh')return a+' '+ao[2];return a+' - '+ao[1];}
function modelStr(pp){var parts=[];if(pp.blade){var n=LANG==='zh'?(bladeZhMap[pp.blade]||pp.blade):pp.blade;parts.push(n);}if(pp.assist)parts.push(pp.assist);if(pp.ratchet)parts.push(pp.ratchet);if(pp.bit)parts.push(pp.bit);return parts.join(' ');}
function bitDisp(a){if(LANG==='zh')return a;var bo=getBitObj(a);return bo?bo[2]:a;}
function fillSel(id,items,defTxt,lblFn){var el=document.getElementById(id);el.innerHTML='<option value="">'+defTxt+'</option>';items.forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=lblFn(v);el.appendChild(o);});}
function populateDD(){var bL=function(n){return getBladeLbl(n);};var rL=function(n){return n+' (~'+getRW(n).toFixed(1)+'g)';};var biL=function(a){return getBitLbl(a);};fillSel('s1Blade',bladeList,tx('selBlade'),bL);fillSel('s2Blade',bladeList,tx('selBlade'),bL);fillSel('s1Ratchet',ratchetList,tx('selRatchet'),rL);fillSel('s2Ratchet',ratchetList,tx('selRatchet'),rL);fillSel('s1Bit',bitList,tx('selBit'),biL);fillSel('s2Bit',bitList,tx('selBit'),biL);var aL=function(a){return getAssistLbl(a);};var al=[];FB_ASSISTS.forEach(function(a){al.push(a[0]);});fillSel('s1Assist',al,tx('selAssist'),aL);fillSel('s2Assist',al,tx('selAssist'),aL);}
function showToast(msg,dur){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');if(dur)setTimeout(function(){t.classList.remove('show');},dur);}
function updateUI(){document.getElementById('p1Name').textContent=tx('player1');document.getElementById('p2Name').textContent=tx('player2');document.getElementById('undoBtn').innerHTML='&#8617;'+tx('undo');document.getElementById('partsBtn').innerHTML='&#9881;'+tx('parts');document.getElementById('newBtn').innerHTML='&#128260;'+tx('newG');document.getElementById('histTitle').innerHTML='&#128203; '+tx('matchHistory');document.getElementById('clearHistBtn').innerHTML='&#128465; '+tx('clearAll');document.getElementById('confirmBtn').textContent=tx('confirm');document.getElementById('clearBtn').textContent=tx('clear');document.getElementById('partsTitle').textContent=tx('selectParts');document.getElementById('p1Hdr').textContent=tx('player1');document.getElementById('p2Hdr').textContent=tx('player2');var bL=tx('blade'),rL=tx('ratchet'),biL=tx('bit'),aL=tx('assist');document.getElementById('lb1B').textContent=bL;document.getElementById('lb2B').textContent=bL;document.getElementById('lb1R').textContent=rL;document.getElementById('lb2R').textContent=rL;document.getElementById('lb1Bit').textContent=biL;document.getElementById('lb2Bit').textContent=biL;document.getElementById('lb1A').textContent=aL;document.getElementById('lb2A').textContent=aL;populateDD();renderDisp(1);renderDisp(2);}
function toggleLang(){LANG=(LANG==='en')?'zh':'en';localStorage.setItem('bbxLang',LANG);updateUI();showToast(LANG==='zh'?'\u5DF2\u5207\u63DB\u81F3\u4E2D\u6587':'Switched to English',1500);}
function renderDisp(p){var pp=p===1?pp1:pp2;var el=document.getElementById('p'+p+'Disp');if(!pp.blade&&!pp.ratchet&&!pp.bit){el.innerHTML='';return;}var html='';if(pp.blade){var sys=bladeSysMap[pp.blade]||'BX';html+='<span class="sys-badge sys-'+sys.toLowerCase()+'">'+sys+'</span>';var tp=bladeTypeMap[pp.blade]||'balance';html+='<span class="type-badge t-'+tp+'">'+tp+'</span> ';var dn=LANG==='zh'?(bladeZhMap[pp.blade]||pp.blade):pp.blade;html+='<span style="font-weight:600">'+dn+'</span> ';}if(pp.assist)html+='<span style="color:#e8daef;font-weight:600">'+pp.assist+'</span> ';if(pp.ratchet)html+='<span style="color:#aaa">'+pp.ratchet+'</span>';if(pp.bit)html+='<span style="color:#aaa">'+bitDisp(pp.bit)+'</span>';var tw=getTotalWt(pp);if(tw>0)html+=' <span class="wt">\u2696~'+tw.toFixed(1)+'g</span>';el.innerHTML=html;}
function onBladeChange1(){var v=document.getElementById('s1Blade').value;document.getElementById('a1Wrap').classList.toggle('hidden',!(v&&isCX(v)));if(!(v&&isCX(v)))document.getElementById('s1Assist').value='';updWt(1);}
function onBladeChange2(){var v=document.getElementById('s2Blade').value;document.getElementById('a2Wrap').classList.toggle('hidden',!(v&&isCX(v)));if(!(v&&isCX(v)))document.getElementById('s2Assist').value='';updWt(2);}
document.getElementById('s1Blade').addEventListener('change',onBladeChange1);document.getElementById('s1Ratchet').addEventListener('change',function(){updWt(1);});document.getElementById('s1Bit').addEventListener('change',function(){updWt(1);});document.getElementById('s1Assist').addEventListener('change',function(){updWt(1);});
document.getElementById('s2Blade').addEventListener('change',onBladeChange2);document.getElementById('s2Ratchet').addEventListener('change',function(){updWt(2);});document.getElementById('s2Bit').addEventListener('change',function(){updWt(2);});document.getElementById('s2Assist').addEventListener('change',function(){updWt(2);});
function openParts(){document.getElementById('partsOvl').classList.remove('hidden');document.getElementById('s1Blade').value=pp1.blade;document.getElementById('s1Assist').value=pp1.assist;document.getElementById('s1Ratchet').value=pp1.ratchet;document.getElementById('s1Bit').value=pp1.bit;document.getElementById('s2Blade').value=pp2.blade;document.getElementById('s2Assist').value=pp2.assist;document.getElementById('s2Ratchet').value=pp2.ratchet;document.getElementById('s2Bit').value=pp2.bit;onBladeChange1();onBladeChange2();}
function closeParts(){document.getElementById('partsOvl').classList.add('hidden');}
function confirmParts(){pp1.blade=document.getElementById('s1Blade').value;pp1.assist=(pp1.blade&&isCX(pp1.blade))?document.getElementById('s1Assist').value:'';pp1.ratchet=document.getElementById('s1Ratchet').value;pp1.bit=document.getElementById('s1Bit').value;pp2.blade=document.getElementById('s2Blade').value;pp2.assist=(pp2.blade&&isCX(pp2.blade))?document.getElementById('s2Assist').value:'';pp2.ratchet=document.getElementById('s2Ratchet').value;pp2.bit=document.getElementById('s2Bit').value;renderDisp(1);renderDisp(2);closeParts();}
function clearAllParts(){['s1Blade','s1Assist','s1Ratchet','s1Bit','s2Blade','s2Assist','s2Ratchet','s2Bit'].forEach(function(id){document.getElementById(id).value='';});onBladeChange1();onBladeChange2();}
function updWt(p){var bl=document.getElementById('s'+p+'Blade').value,ra=document.getElementById('s'+p+'Ratchet').value,bi=document.getElementById('s'+p+'Bit').value;var t=0;if(bl)t+=getBladeWt(bl);if(ra)t+=getRW(ra);if(bi)t+=getBitW();document.getElementById('wt'+p).textContent=t>0?'\u2696 '+tx('estTotal')+' ~'+t.toFixed(1)+'g':'';}
function addPt(player,pts){if(gameOver)return;var rnd={p1Bey:copyPP(pp1),p2Bey:copyPP(pp2),scorer:player,pts:pts};if(player===1)s1+=pts;else s2+=pts;rnd.cumS1=s1;rnd.cumS2=s2;rounds.push(rnd);document.getElementById('p1Score').textContent=s1;document.getElementById('p2Score').textContent=s2;checkWin();}
function undoScore(){if(gameOver)return;if(rounds.length===0)return;rounds.pop();s1=0;s2=0;for(var i=0;i<rounds.length;i++){if(rounds[i].scorer===1)s1+=rounds[i].pts;else s2+=rounds[i].pts;rounds[i].cumS1=s1;rounds[i].cumS2=s2;}document.getElementById('p1Score').textContent=s1;document.getElementById('p2Score').textContent=s2;}
function checkWin(){if(s1>=4){gameOver=true;document.getElementById('p1Score').classList.add('winner');saveMatch(1);try{navigator.vibrate([100,50,200]);}catch(e){}}else if(s2>=4){gameOver=true;document.getElementById('p2Score').classList.add('winner');saveMatch(2);try{navigator.vibrate([100,50,200]);}catch(e){}}}
function newGame(){s1=0;s2=0;rounds=[];gameOver=false;document.getElementById('p1Score').textContent='0';document.getElementById('p2Score').textContent='0';document.getElementById('p1Score').classList.remove('winner');document.getElementById('p2Score').classList.remove('winner');}
function saveMatch(winner){var rec={ts:new Date().toISOString(),s1:s1,s2:s2,w:winner,rounds:[]};for(var i=0;i<rounds.length;i++){rec.rounds.push({p1Bey:copyPP(rounds[i].p1Bey),p2Bey:copyPP(rounds[i].p2Bey),scorer:rounds[i].scorer,pts:rounds[i].pts,cumS1:rounds[i].cumS1,cumS2:rounds[i].cumS2});}matchHist.unshift(rec);if(matchHist.length>200)matchHist=matchHist.slice(0,200);localStorage.setItem('bbxHist',JSON.stringify(matchHist));}
function toggleRounds(idx){var el=document.getElementById('hcr-'+idx);var btn=document.getElementById('hce-'+idx);if(el.classList.contains('open')){el.classList.remove('open');btn.innerHTML=tx('tapExpand');}else{el.classList.add('open');btn.innerHTML=tx('tapCollapse');}}
function openHist(){document.getElementById('histOvl').classList.remove('hidden');var el=document.getElementById('histList');if(matchHist.length===0){el.innerHTML='<p style="text-align:center;color:#888;margin:20px">'+tx('noMatches')+'</p>';return;}var html='';for(var i=0;i<matchHist.length;i++){var m=matchHist[i];var d=new Date(m.ts);var ds=d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});var num=matchHist.length-i;var p1wc=m.w===1?' wl':'';var p2wc=m.w===2?' wl':'';html+='<div class="hcard" onclick="toggleRounds('+i+')">';html+='<div class="hh"><span>#'+num+'</span><span>'+ds+'</span></div>';html+='<div class="hb">';html+='<div class="hs"><span class="'+p1wc+'" style="color:var(--p1);font-size:1.4em;font-weight:900">'+m.s1+'</span></div>';html+='<div class="hvs">VS</div>';html+='<div class="hs"><span class="'+p2wc+'" style="color:var(--p2);font-size:1.4em;font-weight:900">'+m.s2+'</span></div>';html+='</div>';html+='<div style="text-align:center;margin-top:2px;font-size:.85em">'+(m.w===1?tx('p1Wins'):tx('p2Wins'))+'</div>';html+='<div class="hc-expand" id="hce-'+i+'">'+tx('tapExpand')+'</div>';html+='<div class="hc-rounds" id="hcr-'+i+'">';if(m.rounds&&m.rounds.length>0){for(var j=0;j<m.rounds.length;j++){var r=m.rounds[j];var m1=modelStr(r.p1Bey);var m2=modelStr(r.p2Bey);var sc=r.scorer===1?'P1':'P2';var scClass=r.scorer===1?'rnd-p1':'rnd-p2';html+='<div class="rnd-row"><span class="rnd-num">R'+(j+1)+'</span> '+m1+' vs '+m2+' \u2192 <span class="'+scClass+'">'+sc+' +'+r.pts+'</span> <span style="color:#888">('+r.cumS1+'-'+r.cumS2+')</span></div>';}}else{html+='<div class="rnd-row" style="color:#555">(No round data)</div>';}html+='</div></div>';}el.innerHTML=html;}
function closeHist(){document.getElementById('histOvl').classList.add('hidden');}
function clearHist(){if(confirm(tx('clearConfirm'))){matchHist=[];localStorage.removeItem('bbxHist');document.getElementById('histList').innerHTML='<p style="text-align:center;color:#888;margin:20px">'+tx('noMatches')+'</p>';}}
function fetchT(url,ms){var c=new AbortController();var t=setTimeout(function(){c.abort();},ms);return fetch(url,{signal:c.signal}).then(function(r){clearTimeout(t);if(!r.ok)throw new Error();return r.json();}).catch(function(){clearTimeout(t);return null;});}
function mergePartsJSON(data){if(!data)return false;var upd=false;if(data.blades){var seen={};bladeList.forEach(function(n){seen[n]=true;});data.blades.forEach(function(b){if(!seen[b.en]){bladeList.push(b.en);seen[b.en]=true;upd=true;}bladeTypeMap[b.en]=b.type;bladeWtMap[b.en]=b.weight;bladeZhMap[b.en]=b.zh;bladeSysMap[b.en]=b.system;});bladeList.sort();}if(data.ratchets){var rs={};ratchetList.forEach(function(n){rs[n]=true;});data.ratchets.forEach(function(n){if(!rs[n]){ratchetList.push(n);rs[n]=true;upd=true;}});ratchetList.sort(function(a,b){var pa=a.split('-'),pb=b.split('-');var a0=pa[0]==='M'?99:parseInt(pa[0]),b0=pb[0]==='M'?99:parseInt(pb[0]);if(a0!==b0)return a0-b0;return parseInt(pa[1])-parseInt(pb[1]);});}if(data.bits){var bs={};bitList.forEach(function(n){bs[n]=true;});data.bits.forEach(function(b){if(!bs[b.abbr]){bitList.push(b.abbr);bs[b.abbr]=true;upd=true;}});bitList.sort();}return upd;}
function loadLive(){showToast(tx('syncing'),0);fetchT('parts.json',3000).then(function(data){var c=mergePartsJSON(data);if(c)populateDD();showToast(tx('synced')+' '+bladeList.length+' blades',2000);}).catch(function(){showToast(tx('offline')+' ('+bladeList.length+')',2000);});}
